# 极寒防御 V2 · 步骤级 DNA
schema_version: "1.0.0"
stage_id: cryo_guard_v2
pillar: cryo_guard
milestone: v2

design_doc: ../../极寒防御/05_实施推演_设计.md#四v2生产稳态
l4_doc:    ../../../04_阶段规划与实践/极寒防御/03_V2_本阶段实践与验证.md
l5_anchor: l5-pillar-cryo-v2

work_dir: diting-src/diting/cryo_guard/

services_in_scope:
  - embedded_breaker_sdk_in_all_services
  - automated_compliance_export
  - multi_tenant_isolation
  - chaos_engineering_suite
  - advanced_audit_visualization

embedded_breaker_sdk_in_all_services:
  ci_enforce_min_version: true
  bypass_audit_required: true

automated_compliance_export:
  cycles: [weekly, monthly, quarterly]
  encryption: aes-256-gcm
  destination: oss
  retention_lock: true
  retention_years: 7

multi_tenant_isolation:
  tenant_id_in_all_tables: true
  query_must_inject_tenant: true
  cross_tenant_blocked_test: required

chaos_engineering_suite:
  schedule: monthly
  scenarios: [kill_pod, netem, disk_fill, cpu_throttle]
  recovery_sla_seconds: 300

advanced_audit_visualization:
  group_by: correlation_id
  decision_chain_view: true

depends_on:
  - cryo_guard_v1

verification_commands:
  - cmd: "cd diting-src && make audit-coverage-report"
    expect_keywords: ["coverage=100%"]
  - cmd: "cd diting-src && make chaos-cryo-guard"
    expect_exit: 0
  - cmd: "cd diting-src && make compliance-export-dryrun"
    expect_keywords: ["encrypted file ready"]
  - cmd: "cd diting-src && make multi-tenant-isolation-test"
    expect_keywords: ["isolated"]

exit_criteria:
  - 100% 出站对象走 decision_gate（旁路监测）
  - 合规导出周期 ≤ 1 周
  - Chaos 演练通过

failure_protocol:
  same_problem_retry_max: 2
  if_exceeded: Chaos 失败立即停止注入；root cause 分析；不强制重试
