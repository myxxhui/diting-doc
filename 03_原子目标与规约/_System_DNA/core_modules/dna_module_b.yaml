# DNA：Module B 量化扫描引擎
# 规约文档（AI 可读）：03_原子目标与规约/_共享规约/09_核心模块架构规约.md
# L4 实践文档（AI 可读）：04_阶段规划与实践/Stage3_模块实践/03_量化扫描引擎_实践.md（执行层）；策略层见 02_B模块策略_实践.md

module_b_quant_engine:
  purpose: "左脑 - 量化扫描引擎：机会丰度"
  strategy_pools:
    pool_1_trend:
      name: "趋势策略"
      conditions:
        - "均线多头排列：MA5 > MA10 > MA20 > MA60"
        - "MACD 水上金叉：MACD > 0 且 DIF > DEA"
      score_range: [0, 100]
    pool_2_reversion:
      name: "反转策略"
      conditions:
        - "RSI < 20（超卖）"
        - "价格触及 Bollinger 下轨支撑"
      score_range: [0, 100]
    pool_3_breakout:
      name: "突破策略"
      conditions:
        - "价格突破 20 日高点"
        - "成交量 > 2x 均量"
      score_range: [0, 100]
    pool_4_momentum:
      name: "动量策略"
      conditions:
        - "20 日收益率分位 ≥ 0.80"
        - "close > MA20"
      score_range: [0, 100]
  scoring:
    trend:
      macd_hist_scale_ratio: 0.01
    reversion:
      rsi_oversold: 20
      rsi_soft_ceiling: 35
    breakout:
      price_scale_ratio: 0.02
      volume_cap_multiple: 5.0
      atr_scale_enabled: true
      min_atr_multiple: 0.5
  optimization:
    trend_confirm_bars: 3
    breakout_confirm_bars: 2
    reversion_require_above_ma5: true
    multi_pool_min_score: 40
    multi_pool_bonus: 10
    trend_adx_enabled: true
    trend_adx_min: 25
    trend_adx_penalty_ratio: 0.6
    trend_partial_confirm_enabled: true
    trend_partial_confirm_ratio: 0.7
    reversion_volume_bounce_enabled: true
    reversion_volume_bounce_ratio: 1.2
    reversion_volume_bounce_bonus: 1.1
    fusion_mode: weighted
    fusion_weights: [0.7, 0.2, 0.1]
    output_score_percentile: true
    trend_position_strength_enabled: false
    reversion_acute_slow_enabled: false
    reversion_acute_threshold: -0.08
    reversion_slow_threshold: -0.03
    reversion_acute_weight: 1.2
    reversion_slow_weight: 0.6
    breakout_hold_days: 0
    breakout_hold_ratio: 0.98
    pool_4_momentum_enabled: false
    momentum_percentile_threshold: 0.80
    multi_pool_tier2_enabled: false
    multi_pool_tier2_threshold: 60
    multi_pool_tier2_bonus: 5
  filters:
    sector_strength:
      enabled: false
    liquidity:
      enabled: false
      min_score: 0
      as_filter: true
    volatility_regime:
      enabled: false
      percentile_threshold: 0.90
      penalty_ratio: 0.8
  # B 轨长期价值发现：120d 收益截面分位 → long_term_score / long_term_candidate，供 Router 送 VC-Agent
  long_term:
    enabled: true
    lookback_days: 120
    score_threshold: 0.6
  scanner:
    # 标的池以运行时 get_current_a_share_universe() 返回为准，不写死数量；见 11_ 全 A 股标的池（universe）
    technical_score_threshold: 70
    sector_strength_threshold: 1.1
    # 可选收紧：null 表示不启用；见 02_B模块通过组合与设计符合度分析 §五
    pass_require_lead_pool_min: null
    pass_require_second_pool_min: null
# 部署配套：逻辑填充期借鉴组件，须在 Dockerfile/requirements 中显式安装；TA-Lib 需先安装系统层 ta-lib C 库
integration_packages:
  - TA-Lib
  - qlib
  - vectorbt
  - alphalens
