# DNA：Module C MoE 议会（按股配置 + 统一分析）
# 规约文档：09_、12_、Stage3/04_A轨_MoE议会_设计
# L4 实践：04_阶段规划与实践/Stage3_模块实践/04_A轨_MoE议会_实践.md

module_c_moe_council:
  purpose: "右脑 - 按股配置 + 统一分析，单管道输出一条专家意见"
  mode: "按股配置 + 统一分析"
  entry: "unified_opinion(symbol, quant_signal, segment_list, segment_signals, config, domain_tag)"
  router:
    config_key: "moe_router"
    supported_tags: ["农业", "科技", "宏观"]  # 在此列表才走统一分析；否则输出一条不支持
    unknown_behavior: "输出一条 is_supported=False，reasoning_summary 含无法归类"
  input_extension:
    segment_list: "标的的细分列表，每项 {segment_id, revenue_share, is_primary}；来自 A 的 segment_shares 或 L2 标的主营构成表"
    segment_signals: "segment_id -> 解析后信号 {type, direction, strength, summary_cn, risk_tags}；来自 L2 细分信号缓存表"
  strategy:
    alignment:
      primary_weight: 0.6
      other_weight: 0.4
      veto_threshold: 0.3
    multi_segment:
      primary_veto: true
      risk_discount: 0.5
    signal_parse:
      json_fields: ["type", "direction", "strength", "summary_cn", "risk_tags"]
      fallback_keywords_bullish: ["利好", "上涨", "支持", "政策"]
      fallback_keywords_bearish: ["利空", "下跌", "风险"]
  pipeline_steps: ["解析信号", "对齐与主营否决", "认知边界", "多细分加权与超预期维度", "风险等级降权", "拼结构化摘要与 risk_factors", "输出一条 ExpertOpinion"]
  expert_logic_required:
    - "利好与主营对齐：对齐得分公式与否决阈值"
    - "多细分聚合：主营一票否决、按营收加权、风险降权"
    - "认知边界：无主营/全无信号/主营否决/对齐低于阈值 时必须输出不支持"
    - "利好强度：有信号且利好的细分按营收加权取强度，0~1"
    - "景气强度：有利好信号的细分其营收占比之和，0~1"
    - "风险分级：高=任一细分高风险；中=主营利空或默认；低=多数利好且无高风险。高降权0.5中0.9低不降权"
    - "理由摘要须含：对齐得分=xx 景气强度=xx 风险等级=高|中|低 利好强度=xx"
  risk_factor_templates:  # 按 domain_tag 选用，仅文案差异
    农业: ["政策兑现风险", "存栏供给波动", "气候异常"]
    科技: ["研发不及预期", "技术路线替代", "大基金减持"]
    宏观: ["汇率波动", "供需反转"]
