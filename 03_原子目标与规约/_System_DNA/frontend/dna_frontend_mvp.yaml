# 前端 MVP · 步骤级 DNA
schema_version: "1.0.0"
stage_id: frontend_mvp
pillar: frontend
milestone: mvp

design_doc: ../../前端工程与服务/05_实施推演_设计.md#二mvp最小可用产品
l4_doc:    ../../../04_阶段规划与实践/前端工程与服务/01_MVP_本阶段实践与验证.md
l5_anchor: l5-frontend-mvp

work_dir: diting-src/web/

monorepo:
  package_manager: pnpm
  orchestrator: turborepo
  framework: nextjs_app_router_14_plus
  language: typescript_strict

apps_in_scope:
  - console

packages_in_scope:
  - ui-kit
  - api-client
  - auth
  - i18n
  - shared-types
  - sse-client                       # MVP 占位（仅声明，可仅放轮询实现）
  - feature-flags                    # MVP 占位

bff_modules_in_scope:
  - dashboard-bff
  - risk-bff
  - memory-bff

scenarios_in_scope:
  - id: S1
    name: 个性化驾驶舱
  - id: S5
    name: 风险熔断面板
  - id: S6
    name: 智能记忆栈基础

api_codegen:
  proto_to_ts: true
  openapi_to_ts: true

ui_kit_components_mvp:
  - Button
  - Card
  - EmptyState
  - LoadingSpinner
  - EvidenceTrail
  - ConfidenceBar
  - DegradedBadge
  - NotificationBudgetMeter

performance_budget:
  lcp_ms_max: 2500
  inp_ms_max: 200
  cls_max: 0.1
  js_gzip_kb_max_first_route: 250

a11y:
  ci_enforce_axe: true
  standard: wcag_2_1_aa

i18n:
  default: zh-CN
  secondary: [en]
  hardcode_forbidden: true

testing:
  unit: vitest
  component: testing_library
  e2e: playwright
  e2e_paths_in_scope:
    - login
    - S1_dashboard_view
    - S5_risk_feed_view

depends_on:
  - cryo_guard_mvp
  - super_evo_mvp

verification_commands:
  - cmd: "cd diting-src/web && pnpm install && pnpm lint && pnpm typecheck && pnpm test && pnpm build"
    expect_exit: 0
  - cmd: "cd diting-src/web && pnpm e2e"
    expect_exit: 0

exit_criteria:
  - 用户登录后能看到 S1 / S5 / S6 三个场景
  - Lighthouse 评分（LCP/INP/CLS）达标
  - E2E（登录 + S1 + S5）通过
  - 单元测试覆盖率 ≥ 70%

failure_protocol:
  same_problem_retry_max: 2
  if_exceeded: 回退到最近一次稳定提交并登记
