# 超级个体进化 MVP · 步骤级 DNA
schema_version: "1.0.0"
stage_id: super_evo_mvp
pillar: super_evo
milestone: mvp

design_doc: ../../超级个体进化/05_实施推演_设计.md#二mvp最小可用产品
l4_doc:    ../../../04_阶段规划与实践/超级个体进化/01_MVP_本阶段实践与验证.md
l5_anchor: l5-pillar-evo-mvp

work_dir: diting-src/diting/super_evo/

services_in_scope:
  - feedback_collector
  - knowledge_base_with_rag_pgvector
  - external_action_boundary_notification_only
  - version_manager_register_only

proto_v1_minimal:
  - UserFeedback
  - ImplicitSignal
  - KnowledgeEntry
  - RAGQuery
  - RAGResult
  - ExternalActionRequest
  - ExternalActionResult
  - VersionEntry

db_tables:
  - feedback_explicit
  - feedback_implicit
  - knowledge_entries
  - version_entries
  - external_action_records

knowledge:
  vector_engine: pgvector
  rag:
    top_k_default: 8
    hybrid: { dense: 0.6, sparse: 0.4 }
    rerank_enabled: false           # MVP 关
  decay:
    enabled: false                   # MVP 关；V1 开

external_action:
  kinds_supported: [notification]    # MVP 仅通知
  idempotency_required: true
  audit_required: true
  gate_required: true

version_manager:
  capabilities: [register, query]    # MVP 不含 rollout / rollback
  signature_required: true

frontend:
  app: console
  page: memory_stack_mvp             # 见 frontend/dna_frontend_mvp.yaml

depends_on:
  - cryo_guard_mvp
  - shared_platform_baseline

verification_commands:
  - cmd: "cd diting-src && make test-super-evo-mvp"
    expect_exit: 0
  - cmd: "cd diting-src && make smoke-super-evo-mvp"
    expect_keywords:
      - "反馈写入"
      - "RAG 检索"
      - "通知触发"
      - "门禁审计 通过"

exit_criteria:
  - 反馈延迟 < 5s
  - 议会能从 RAG 拉到知识
  - 通知动作 100% 经门禁

failure_protocol:
  same_problem_retry_max: 2
  if_exceeded: 回退到最近一次稳定提交并登记
