# DNA · 维度零·AI 投资副驾驶·启动期
# 与 L3 设计 1:1:1 对齐：03_原子目标与规约/00_维度零_AI投资副驾驶/stages/stage_1_启动期/

version: "v1.2"
last_updated: "2026-05-30"

dimension:
  id: 0
  code: "co_pilot"
  cn: "AI 投资副驾驶"
  philosophy_pillars: ["①资产保值", "②复利", "⑧归因闭环"]

stage:
  id: "stage_1_启动期"
  duration_weeks: 12
  product_mode: "观察者模式"  # 系统建议 → 用户自主决定 → 系统记录

one_line_goal: |
  用 4 个子模块拼出 AI 投资副驾驶的最小产品闭环，
  让 50 万本金的个人投资者第一天打开就有用、3 个月后能感知到避险与收益价值。

quantitative_goals:
  - name: "产品模块上线数"
    value: 4
    detail: "持仓体检 / 推荐池 / 紧急告警 / 价值账本"
  - name: "首屏加载时间"
    threshold: "< 1s"
  - name: "红色告警 5 分钟到达率"
    threshold: ">= 99.5%"
  - name: "月报准时率"
    threshold: "100%"
  - name: "用户连续 12 周活跃"
    threshold: "不放弃使用"
  - name: "月度避险价值"
    threshold: ">= ¥3000"

deliverables:
  modules:
    - id: "M1"
      name: "持仓体检报告"
      key_outputs: ["首屏 4 色卡片", "单持仓详情页", "节点 4 态展示", "30 天健康度曲线"]
      depends_on_events: ["events:monitor:health_change"]
      deliver_week: "W4"
    - id: "M2"
      name: "推荐池与 thesis 卡"
      key_outputs: ["推荐池页", "thesis 卡详情（5 必填）", "3 操作按钮", "PDF 导出"]
      depends_on_events: ["events:thrust:thesis_proposed"]
      deliver_week: "W5"
    - id: "M3"
      name: "紧急告警系统"
      key_outputs: ["4 红 + 2 橙告警", "微信/Telegram/邮件三通道"]
      depends_on_events: ["events:cryo_guard:reject", "events:exit:sell_signal", "events:monitor:health_change"]
      deliver_week: "W6"
    - id: "M4"
      name: "价值账本"
      key_outputs: ["SCS 指标", "EV 指标", "8 象限归因", "月报 PDF", "自我熔断"]
      depends_on_events: ["综合所有维度事件"]
      deliver_week: "W7-W8"
    # ── 波次二：信息架构升级 · 三大工作台（M5/M6/M7）──
    # 在 M1~M4 最小闭环之上重构前端 IA（7 平铺 → 4+1 导航），把六维度能力按"标的视角 + 决策视角"聚合穿插。
    # 对应 L3 step_11/12/13；只读聚合已实现后端，缺上游维度以 pending 灰态占位。
    - id: "M5"
      name: "持仓监管工作台"
      l3_step: "step_11_持仓监管工作台.md"
      key_outputs: ["导航 IA 4+1 重构（持仓管理→持仓监管）", "标的监管驾驶舱卡", "四维扫描聚合（D1极寒防御/D2进攻逻辑/D3逻辑破坏/D3物理量探针）", "行情阶段（D2 Timer 潜伏/主升/撤退）", "操作建议标签 advisory（D4 SP1~SP5 + Timer）", "组合总览条", "监管平台 API sync stub（扩展期）"]
      depends_on_events: ["events:cryo_guard:reject", "events:cryo_guard:degrade", "thesis_cards.timer_signal", "events:monitor:health_change", "events:exit:sell_signal", "monitor:{symbol}:dict"]
      reuse: ["step_03 health_records", "step_04 thesis_pool", "step_05 alerts"]
      permanent_rule: "no-auto-order：仅展示与建议，禁下单按钮/链接"
    - id: "M6"
      name: "行情解析与规划工作台"
      l3_step: "step_12_行情解析与规划工作台.md"
      key_outputs: ["Campaign 模型（图谱 Part A + 计划 Part B 双层）", "4 视图（🔭行情雷达/📝规划中/🚀执行中/🗓️滚动路线图）", "标的调研档案（位置/阶段/已执行动作/三支柱）", "三支柱监控（moat物理逻辑/catalyst利好/risk风险 定时数据收集）", "利好爆发时间线", "advisory 动作链节点", "关注清单 + 推荐池并入"]
      data_model: ["campaigns", "campaign_symbols", "campaign_nodes", "campaign_timeline", "monitor_subscriptions", "watchlist"]
      depends_on_events: ["events:thrust:thesis_proposed", "D2 Sniffer 三源 + Scorer 三维", "monitor:{symbol}:dict（moat）", "events:cryo_guard:* + events:monitor:health_change（risk）"]
      permanent_rule: "no-auto-execute：动作 execute_mode=advisory + human_confirmation_required；禁 buy/qmt/auto_trade/order_id"
    - id: "M7"
      name: "产业图谱关系链研究"
      l3_step: "step_13_产业图谱关系链研究.md"
      key_outputs: ["每 Campaign 专属产业知识图谱（Part A）", "node_type concept/entity 两层（概念→标的实体演进）", "confirm_state confirmed/inferred 两态（官方信息=确认，复用 D2 Critic PHYSICAL/SOFT 等级）", "4 视图（生态/机会/风险穿透/危险监控）", "与 M6 计划双向联动", "Cytoscape/vis 可视化"]
      data_model: ["graph_nodes", "graph_edges"]
      depends_on_data: ["related_party_graph（D1 340 节点）", "D2 Architect 产业链 + Critic evidence", "D3 P5/P6/P7 + monitor:dict", "D1 关联交易引擎（风险穿透）"]
      permanent_rule: "no-trade：研究/监控视图，不含下单/执行动作"
    # ── 波次三：价值实现升级 · 四区漏斗 + 三段流水线（M8/M9/M10/M11）──
    # 把工作台从占位 UI 升级为端到端有方向的四区漏斗（雷达→路线图→规划→执行→滚动回流）；
    # 每区内部统一 T0 代码采集 → T1 自训模型压缩 → T2 顶尖模型推理；三段全落 stage_artifacts 可审计。
    # 架构总纲：_共享规约/25_四区漏斗_三段流水线_架构脊柱_设计.md；需求主表：24_ §9。
    - id: "M8"
      name: "行情雷达扫描与三段流水线"
      l3_step: "step_14_行情雷达扫描与三段流水线.md"
      key_outputs: ["地基三表（stage_artifacts/workspace_artifacts/model_profile）", "雷达 3 模式（A 热度行业/B 概念表达/C 模糊标的·先做C）", "T0/T1/T2 三段流水线骨架 + ContextMatrixBuilder", "候选全方位评估（生态位/价值链/龙头/壁垒/利润/阶段/利好爆发窗/风险）", "候选 promote 一键晋级 Campaign（带 analysis_snapshot）"]
      data_model: ["stage_artifacts", "workspace_artifacts", "model_profile", "radar_scans", "radar_candidates"]
      depends_on_data: ["D2 ProfitCapturePlaybook/EvidenceChainBuilder/Lighthouse(AIDispatcher)", "D3 market_phase/MonitorDictReader", "行情 MarketQuoteClient"]
      permanent_rule: "no-mock：龙头/壁垒/概念无引擎→inferred 禁伪造；T1 未训用 t1_fallback；T2 默认关 RADAR_T2_ENABLED=false 控成本"
    - id: "M9"
      name: "滚动路线图双层锚定"
      l3_step: "step_15_滚动路线图双层锚定.md"
      key_outputs: ["维度一：时间线编排 + T0 合理性评估（建仓窗/窗口冲突/资金撞车/排序倒挂 4 flag）", "维度二：行情生命周期判定（single/short/mid/long_multiwave，启动期 thesis/Timer 代理全 inferred）", "长周期巡检订阅（falsify_type=regime）", "滚动闭环（归档保留 long 标的 + next_wave_window）"]
      data_model: ["regime_assessments", "campaign_timeline（扩展 window_start/end/build_lead_days/feasibility_flags/sequence_no）"]
      depends_on_data: ["step_14 radar_candidates.catalyst_window", "D2 Timer/thesis.horizon（生命周期代理）", "交易日历 akshare"]
      permanent_rule: "维度一全 T0 纯规则；维度二全 inferred，confirmed 由 step_16 巡检证据驱动"
    - id: "M10"
      name: "规划中证伪与持续监控"
      l3_step: "step_16_规划中证伪与持续监控.md"
      key_outputs: ["认知快照（analysis_snapshot + workspace_artifacts + 溯源链）", "4 类证伪任务（moat 物理壁垒/niche 生态位/catalyst 利好追踪/risk 风险）", "证伪 verdict 引擎（缺源 pending/被推翻 alert）", "证据累积 stage_artifacts(planning)", "晋级就绪度 advisory"]
      data_model: ["monitor_subscriptions（扩展 falsify_type/hypothesis）", "stage_artifacts(workspace=planning)"]
      depends_on_data: ["D3 P5/P6/P7+MonitorDictReader（moat）", "D2 Architect（niche）+Sniffer（catalyst）", "D1 FinancialFraudEngine+health（risk）"]
      permanent_rule: "no-mock：缺源 pending 禁默认 ok；被推翻 alert；晋级 human_confirmation；独立源交叉验证（22_ 规约）"
    - id: "M11"
      name: "执行中仓位指导"
      l3_step: "step_17_执行中仓位指导.md"
      key_outputs: ["持仓×实时价×仓位 → advisory 仓位指导（建仓/加仓/浮盈减仓/浮亏处理/持有/清仓提示 6 场景）", "盘后安全扫描门控（FinancialFraudEngine fraud→压制加仓）", "一波完成归档 + long_multiwave 回流路线图（漏斗闭环）"]
      data_model: ["execution_advices"]
      depends_on_data: ["holdings_sot（持仓 SoT）", "MarketQuoteClient（实时价）", "D1 FinancialFraudEngine（安全扫描 T1）", "step_16 就绪度"]
      permanent_rule: "no-auto-execute 最强红线：execute_mode=advisory + human_confirmation；schema/模板/路由禁 buy/qmt/auto_trade/order_id；rg=0"

# 波次三架构脊柱（四区漏斗 + 三段流水线 + 模型路由）· 详见 _共享规约/25_
funnel_pipeline_v3:
  arch_spine_doc: "03_原子目标与规约/_共享规约/25_四区漏斗_三段流水线_架构脊柱_设计.md"
  funnel:
    - { zone: radar,     cn: "行情雷达",   step: "step_14", role: "认知生成（顶级模型全方位评估）" }
    - { zone: roadmap,   cn: "滚动路线图", step: "step_15", role: "双层时间锚定（编排合理性 / 生命周期巡检）" }
    - { zone: planning,  cn: "规划中",     step: "step_16", role: "验证证伪（4 类证伪任务 + 持续监控）" }
    - { zone: executing, cn: "执行中",     step: "step_17", role: "持仓指导（advisory 仓位 + 安全门控）" }
  gate: "每区晋级需 human_confirmation；long_multiwave 归档后回流 roadmap 滚动"
  three_stage:
    T0: "代码/规则采集（确定性·免费·全量）：行情/阶段/利润/探针/持仓/价格"
    T1: "自训功能模型压缩（LoRA·vLLM，缺则规则 fallback）：关键数据集/语义抽取/财务测谎/生命周期初判"
    T2: "顶尖大模型推理（Anthropic Opus·只读 T1 压缩集+上游 artifact）：跨维因果/证伪/最终决断"
stage_artifact:
  tables: ["stage_artifacts", "workspace_artifacts"]
  audit: "三段全落库（model_id+prompt_ver+engine_ver+input_refs）；区间 workspace_artifacts.upstream_refs 级联；溯源链可回溯"
  cost_control: "T2 幂等缓存（input_refs hash 未变复用）；RADAR_T2_ENABLED 默认 false；月预算上限"
model_profile:
  desc: "配置驱动模型路由，升级 AIDispatcher scene；每区 UI 可选档位（默认/略高级/顶尖/本地自训），override_allowed 时临时覆盖"
  tiers: ["T0 功能引擎(无LLM)", "T1 本地自训LoRA(vllm)", "T2 顶尖大模型(anthropic:opus)"]
  safety_scan: "FinancialFraudEngine(T1 LoRA) 横切，规划区按需+定时 / 执行区盘后；fraud→压制加仓 advisory"
roadmap_dual_anchor:
  dim1: "本次作战时间线编排 + 合理性评估（建仓窗/窗口冲突/资金撞车/排序倒挂）"
  dim2: "行情生命周期判定（单次/短/中/长多波）+ 长周期巡检确认 + 滚动闭环"
decision_pending_v3:
  - "T2 Opus 高频深度评估月成本可能 > ¥100：默认 T0/T1 兜底，主动触发 T2 + 月预算 + 幂等缓存"
  - "T1 各区专业 LoRA 训练需 GPU：沿用 P 轨按需 GPU，先规则/通用占位逐个替换"

# 波次二导航信息架构（IA）：7 平铺项 → 4+1
navigation_ia_v2:
  - { nav: "总览驾驶舱",        route: "/",                owner: "M1~M7 汇总" }
  - { nav: "🛡️ 持仓监管",      route: "/portfolio-guard", owner: "M5（合并 持仓管理+持仓体检+告警）" }
  - { nav: "📡 行情解析及规划", route: "/planning",        owner: "M6（合并 推荐池+雷达+关注清单）" }
  - { nav: "🕸️ 产业图谱",      route: "/graph",           owner: "M7" }
  - { nav: "📒 价值账本",       route: "/value",           owner: "M4（保留）" }
  - { nav: "⚙️ 系统",          route: "/system",          owner: "健康检查+数据源+告警历史归档+持仓手工CRUD/Excel兜底+监管平台账户绑定" }

excluded_in_stage_1:
  - "反馈闭环 verified（→ 扩展期）"
  - "券商 API 自动同步（→ 扩展期）"
  - "电话告警（→ 完善期）"
  - "自动驾驶限额（→ 完善期）"
  - "议会模式 UI（→ 完善期）"

tech_stack:
  backend: "FastAPI 0.110+"
  frontend: "HTMX 1.9 + Alpine.js 3.x"
  template: "Jinja2 3.x"
  database: "SQLite 3.40+"
  cache_stream: "Redis 7.x"
  scheduler: "APScheduler 3.x"
  pdf: "WeasyPrint 60+"

work_dir: "diting-src"
service_name: "copilot"

dependencies:
  upstream:
    - "01_cryo_guard P0: 3 引擎 + reject/degrade/pass 事件流就绪"
    - "02_deep_strike P0: thesis_proposed 事件流就绪"
    - "03_holding_watch P0: health_change 事件流 + 节点 4 态 API 就绪"
    - "04_exit_engine P0: sell_signal 事件流就绪"
    - "05_super_evo P0: 4 组件就绪"

verification_commands:
  - "make health-check"
  - "make test-copilot"
  - "make test-e2e"

exit_criteria:
  - "4 子模块全部 K8s Pod Running"
  - "首屏加载 < 1s（Lighthouse 验证）"
  - "红色告警 5 分钟到达率 ≥ 99.5%（SLA 监控）"
  - "月报 T+1 准时率 100%"
  - "用户连续 12 周活跃"
  - "架构师签字"

l3_design_doc: "03_原子目标与规约/00_维度零_AI投资副驾驶/stages/stage_1_启动期/"
l4_practice_dir: "04_阶段规划与实践/00_维度零_AI投资副驾驶/stage_1_启动期/"
l5_stage_anchor: "l5-stage-d0s1"

cost_budget_monthly:
  total: "≤ ¥50"
  breakdown:
    web_service: "¥0（本地部署）"
    database: "¥0（SQLite）"
    wechat_robot: "¥0（企业微信 webhook）"
    telegram_bot: "¥0（Bot API）"
    email: "¥50/月（Resend/Mailgun 免费额度）"

revision:
  - date: "2026-05-16"
    note: "初版（M1~M4 最小闭环）"
  - date: "2026-05-29"
    note: "v1.1 波次二：新增 M5 持仓监管工作台 / M6 行情解析与规划工作台 / M7 产业图谱关系链研究（对应 L3 step_11/12/13）+ navigation_ia_v2（7→4+1）；只读聚合已实现后端，缺上游 pending；no-auto-order/no-auto-execute/no-trade 永久红线"
  - date: "2026-05-30"
    note: "v1.2 波次三（价值实现升级·四区漏斗+三段流水线）：新增 M8 行情雷达扫描与三段流水线 / M9 滚动路线图双层锚定 / M10 规划中证伪与持续监控 / M11 执行中仓位指导（对应 L3 step_14/15/16/17）+ 架构键 funnel_pipeline_v3（四区漏斗+T0/T1/T2 三段）/ stage_artifact（两级落库审计+溯源+成本控制）/ model_profile（配置驱动模型路由+安全扫描）/ roadmap_dual_anchor（时间线合理性+生命周期巡检）+ decision_pending_v3（T2 成本/T1 GPU）；架构脊柱 _共享规约/25_；需求主表 24_ §9；no-auto-execute/no-mock/晋级人工确认/审计可查证 永久红线"
