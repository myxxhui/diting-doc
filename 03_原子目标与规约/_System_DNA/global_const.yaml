# =============================================================================
# global_const.yaml — Diting 项目全局 DNA
# 版本：v2.0（2026-05-13 重构后）
# 已移除：stage1~5 / module_a~f 旧体系
# 当前结构：四大抽象模块 + 前端 + 共享平台基础
# =============================================================================
schema_version: "2.0.0"
project: diting
project_codename: diting
last_updated: "2026-05-13"

# =============================================================================
# 顶层愿景（来自 L1）
# =============================================================================
vision:
  one_line: "为超级个体打造 7×24 不疲倦的 AI 投研协作系统"
  pillars:
    - id: cryo_guard
      cn: 极寒防御
      en: Cryo-Guard
      role: 不可信不放过；坏环境进入冻结；坏决策不出门
    - id: deep_strike
      cn: 纵深进攻
      en: Deep-Strike
      role: 把高维碎片压成有解释、有证据的研究结论
    - id: state_watch
      cn: 状态机监控
      en: State-Machine Watch
      role: 对每个标的 / 主营 / 议题以状态机形式持续监控与节奏化通知
    - id: super_evo
      cn: 超级个体进化
      en: Super-Individual Evolution
      role: 把每天发生的事沉淀为可复用资产；评测 / 复盘 / 版本 / 闭环
    - id: frontend
      cn: 前端工程与服务
      en: Frontend & Services
      role: 把"系统能做的"翻译成"用户能做的"

# =============================================================================
# 仓库与目录约定
# =============================================================================
repos:
  doc:
    name: diting-doc
    role: 文档仓（受 00_系统规则_通用项目协议.md 约束）
  src:
    name: diting-src
    role: 代码仓（重构后的实现）
    legacy_reference: diting-core   # 保留只读参考，不再演进
  infra:
    name: diting-infra
    role: 部署仓（Helm / Chart / K8s / CI）

work_dirs:
  cryo_guard:    diting-src/diting/cryo_guard/
  deep_strike:   diting-src/diting/deep_strike/
  state_watch:   diting-src/diting/state_watch/
  super_evo:     diting-src/diting/super_evo/
  frontend:      diting-src/web/
  protocols:     diting-src/design/protocols/
  schemas:       diting-src/design/schemas/
  rules:         diting-src/design/rules/
  config:        diting-src/config/
  scripts:       diting-src/scripts/
  tests:         diting-src/tests/

# =============================================================================
# L2 战略维度 ↔ DNA 主题节点映射
# =============================================================================
strategic_dimensions:
  cryo_guard:
    - cryo_guard_top
  deep_strike:
    - deep_strike_top
  state_watch:
    - state_watch_top
  super_evo:
    - super_evo_top
  frontend:
    - frontend_top
  shared_platform:
    - tech_stack
    - constraints
    - governance_and_dr
    - protocols
    - production_requirements

# =============================================================================
# 极寒防御（Cryo-Guard）顶层 DNA
# 详细子键见 _System_DNA/cryo_guard/*.yaml
# =============================================================================
cryo_guard_top:
  scope:
    in:
      - risk_event_bus
      - decision_gate
      - circuit_breaker
      - input_sanitizer
      - audit_log_service
    out:
      - producing_research_conclusion
      - state_machine_lifecycle
      - external_action_execution
      - knowledge_writing
      - user_authentication
  slo:
    decision_gate_p50_ms: 50
    decision_gate_p99_ms: 200
    breaker_change_to_notify_sec: 1
  audit:
    chain_hash: true
    snapshot_interval_min: 10
    worm_storage: true
    retention_years_min: 5

# =============================================================================
# 纵深进攻（Deep-Strike）顶层 DNA
# 详细子键见 _System_DNA/deep_strike/*.yaml
# =============================================================================
deep_strike_top:
  scope:
    in:
      - content_comprehension_service
      - signal_feature_engine
      - research_council_service
      - agenda_orchestrator
      - expectation_gap_quantifier
      - candidate_registry
    out:
      - decision_gating          # 归 cryo_guard
      - state_machine_lifecycle  # 归 state_watch
      - eval_and_retrain         # 归 super_evo
      - external_action_call     # 归 super_evo
  slo:
    small_session_e2e_p50_sec: 30
    small_session_e2e_p99_sec: 120
    evidence_chain_coverage_pct: 100
    fallback_coverage_pct_min: 95
  council:
    require_evidence_chain: true
    require_confidence: true
    fallback_required: true

# =============================================================================
# 状态机监控（State-Machine Watch）顶层 DNA
# 详细子键见 _System_DNA/state_watch/*.yaml
# =============================================================================
state_watch_top:
  scope:
    in:
      - template_instance_registry
      - probe_scheduler
      - transition_evaluator
      - advisory_generator
      - notification_dispatcher
      - watchlist_grouping
    out:
      - producing_research_conclusion
      - decision_gating
      - external_action_execution
      - knowledge_writing
      - data_acquisition
  slo:
    transition_to_user_notify_sec: 5
    template_hot_update_sec: 30
  notification_budget_default:
    daily_max: 30
    hourly_max: 10
    high_severity_bypass: true
    overflow_strategy: digest
  advisory:
    require_evidence: true
    require_fallback: true

# =============================================================================
# 超级个体进化（Super-Individual Evolution）顶层 DNA
# 详细子键见 _System_DNA/super_evo/*.yaml
# =============================================================================
super_evo_top:
  scope:
    in:
      - eval_center
      - feedback_collector
      - knowledge_base
      - retrospective_service
      - version_manager
      - external_action_boundary
      - user_profile_service
    out:
      - decision_gating
      - producing_research_conclusion
      - state_machine_lifecycle
      - data_acquisition
  slo:
    feedback_to_db_sec_max: 5
    eval_coverage_pct_min: 90
    knowledge_dedup_rate_min: 0.95
  external_action:
    idempotency_required: true
    audit_required: true
    gate_required: true
    idempotency_ttl_sec: 86400
  rollout_default_steps:
    - { traffic_pct: 0.05, dwell_minutes: 60 }
    - { traffic_pct: 0.20, dwell_minutes: 120 }
    - { traffic_pct: 0.50, dwell_minutes: 240 }
    - { traffic_pct: 1.00, dwell_minutes: 0 }

# =============================================================================
# 前端工程与服务（Frontend & Services）顶层 DNA
# 详细子键见 _System_DNA/frontend/*.yaml
# =============================================================================
frontend_top:
  scenarios:
    - id: S1
      name: 个性化驾驶舱
      consumes: [state_watch, deep_strike, super_evo]
    - id: S2
      name: 标的工作台
      consumes: [state_watch, deep_strike]
    - id: S3
      name: 投研对话台
      consumes: [deep_strike, super_evo]
    - id: S4
      name: 关注列表中心
      consumes: [state_watch, super_evo]
    - id: S5
      name: 风险熔断面板
      consumes: [cryo_guard]
    - id: S6
      name: 智能记忆栈
      consumes: [super_evo]
    - id: S7
      name: 管理员驾驶舱
      consumes: [all]
  bff_modules:
    - dashboard-bff
    - subject-bff
    - chat-bff
    - watchlist-bff
    - risk-bff
    - memory-bff
    - admin-bff
  tech_stack_candidate:
    framework: nextjs_app_router
    language: typescript_strict
    ui_kit: radix_tailwind
    state_remote: tanstack_query
    state_local: zustand
    realtime: sse_first_ws_for_collab
    charts: echarts
    state_machine_visual: react_flow
    test: vitest_playwright
    build: turborepo_pnpm
  performance_budget:
    lcp_ms_max: 2500
    inp_ms_max: 200
    cls_max: 0.1
    js_gzip_kb_max_first_route: 250
  a11y:
    standard: wcag_2_1_aa
    ci_enforce_axe: true
  i18n:
    default: zh-CN
    secondary: [en]

# =============================================================================
# 共享平台基础（Tech / Protocols / Constraints / Governance / Production）
# 详细规约见 03_/_共享规约/
# =============================================================================
tech_stack:
  language_backend: [python_3_11_plus, go_1_22_plus]
  language_frontend: typescript_strict
  data_store_primary: postgresql_15_plus
  data_store_timeseries: timescaledb
  data_store_object: s3_compatible
  search: opensearch
  vector_store_candidate: [milvus, pgvector, opensearch_dense_vector]
  message_bus: kafka
  cache: redis
  feature_store_candidate: [feast, custom]
  inference_gateway: custom_via_api_port
  k8s: k3s_or_managed
  helm_chart_repo: diting-infra/charts/diting-stack

protocols:
  comm:
    matrix_doc: ../../03_原子目标与规约/_共享规约/04_全链路通信协议矩阵.md
    required_fields: [request_id, schema_version, correlation_id, source_ref]
  proto_packages:
    - cryo_guard.v1
    - deep_strike.v1
    - state_watch.v1
    - super_evo.v1
  api_port_doc: ../../03_原子目标与规约/_共享规约/05_接口抽象层规约.md
  config_center_doc: ../../03_原子目标与规约/_共享规约/06_动态配置中心规约.md
  data_versioning_doc: ../../03_原子目标与规约/_共享规约/07_数据版本控制规约.md
  heartbeat_doc: ../../03_原子目标与规约/_共享规约/08_心跳协议与健康检查规约.md
  governance_doc: ../../03_原子目标与规约/_共享规约/10_运营治理与灾备规约.md
  data_input_doc: ../../03_原子目标与规约/_共享规约/11_数据采集与输入层规约.md

constraints:
  semver_for_breaking_change: true
  worm_audit: true
  idempotency_for_external_action: true
  must_have_evidence_chain_for_research_card: true
  must_have_fallback_for_advisory: true
  must_pass_decision_gate_before_external: true
  test_coverage_min_pct: 70
  ci_block_on_lint_typecheck_unit: true

production_requirements:
  multi_env: [dev, staging, canary, prod]
  multi_region_dr: planned_v2
  release_bundle_same_tag: true
  blue_green_or_canary: required
  rollback_one_click: required
  audit_every_external_action: required
  inference_cost_budget: configured_per_env

governance_and_dr:
  adr_required_for_breaking_change: true
  l4_step_must_link_to_l3: true
  retention:
    audit_logs_years_min: 5
    risk_events_days_main: 90
    research_outputs_years_min: 1
  dr:
    rto_minutes_max: 60
    rpo_minutes_max: 15
  config_change_workflow:
    require_review: true
    canary_required: true

# =============================================================================
# 4 大可部署单元（按服务粒度，由 dna_dev_workflow 引用）
# =============================================================================
deployable_units:
  - id: cryo_guard_stack
    pillar: cryo_guard
    services: [risk_event_bus, decision_gate, circuit_breaker, input_sanitizer, audit_log_service]
  - id: deep_strike_stack
    pillar: deep_strike
    services: [content_comprehension_service, signal_feature_engine, research_council_service, agenda_orchestrator, expectation_gap_quantifier, candidate_registry]
  - id: state_watch_stack
    pillar: state_watch
    services: [template_instance_registry, probe_scheduler, transition_evaluator, advisory_generator, notification_dispatcher, watchlist_grouping]
  - id: super_evo_stack
    pillar: super_evo
    services: [eval_center, feedback_collector, knowledge_base, retrospective_service, version_manager, external_action_boundary, user_profile_service]
  - id: frontend_stack
    pillar: frontend
    services: [console, mobile_pwa, admin_app, bffs]
  - id: shared_platform
    pillar: shared_platform
    services: [postgresql, opensearch, kafka, redis, k3s, inference_gateway, config_center]
