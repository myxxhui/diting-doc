# 超级个体进化 V2 在线持续学习 · 步骤级 DNA
schema_version: "1.0.0"
stage_id: super_evo_v2_online
pillar: super_evo
milestone: v2

design_doc: ../../超级个体进化/05_实施推演_设计.md#四v2生产稳态
l4_doc:    ../../../04_阶段规划与实践/维度五_演进飞轮/05_V2_online_本阶段实践与验证.md
l5_anchor: l5-pillar-evo-v2-online

work_dir: diting-src/diting/super_evo/

services_in_scope:
  - online_continual_learning
  - dpo_rlhf_pipeline
  - multi_model_moe_finetune
  - safety_guards
  - auto_labeling_pipeline

online_continual_learning:
  window: hourly_or_daily_increment
  catastrophic_forgetting_max_pct: 5
  baseline_eval_required: true

dpo_rlhf_pipeline:
  framework: trl
  pair_dataset_min: 1000
  preference_alignment_min_uplift_pct: 3

multi_model_moe_finetune:
  shared_lora: true
  router_learning: true

safety_guards:
  toxicity_detector: true
  privacy_scrub: true
  jailbreak_eval: true
  detect_recall_min_pct: 95

auto_labeling_pipeline:
  teachers: [claude_sonnet, gpt_5]
  human_audit_sample_pct: 10
  quality_pass_min_pct: 90

depends_on:
  - super_evo_v1_version
  - super_evo_v1_eval
  - super_evo_v1_retro

verification_commands:
  - cmd: "cd diting-src && make test-online-learning"
    expect_keywords: ["forgetting<=5%"]
  - cmd: "cd diting-src && make dpo-pipeline-bench"
    expect_keywords: ["uplift>=3%"]
  - cmd: "cd diting-src && make safety-guard-bench"
    expect_keywords: ["recall>=95%"]
  - cmd: "cd diting-src && make auto-label-pipeline-bench"
    expect_keywords: ["quality>=90%"]

exit_criteria:
  - 在线学习不引发回归
  - DPO 偏好对齐有效
  - 安全防护通过

failure_protocol:
  same_problem_retry_max: 2
  if_exceeded: 在线学习引发回归 → 自动暂停 + 回滚 + lineage 复盘
