# D2 Stage1 Step11 · 估值动态评估器 DNA（v1.0）
# 与 02_维度二_纵深进攻/stages/stage_1_启动期/steps/step_11_估值动态评估器.md 1:1

schema_version: "1.0.0"
stage_id: d2_stage1_step11
pillar: deep_strike
milestone: mvp

design_doc: ../../02_维度二_纵深进攻/stages/stage_1_启动期/steps/step_11_估值动态评估器.md
l4_doc: ../../../04_阶段规划与实践/02_维度二_纵深进攻/stage_1_启动期/实践记录_step_11_估值动态评估器.md
l5_anchor: l5-stage-d2s1-step11

work_dir: diting-src/

service_name: deep-strike  # 复用 step_01 服务
port: 8082
package_path: apps/deep_strike/valuation/

depends_on:
  - d2_stage1_step05  # thesis 卡 schema 升级
  - shared_21_market_data_circuit  # 行情数据断路器
  - shared_22_fact_gate            # 多源验证

# =====================================================================
# 4 档戴维斯判定规则（启动期硬约束）
# =====================================================================
davis_classification_rules:
  - { phase: davis_double_click, conditions: ["pe_percentile_180d >= 0.8", "pe_trend_30d > 0", "eps_growth_rate_pct >= 5"], meaning: "业绩+估值共振主升浪" }
  - { phase: single_click_eps, conditions: ["eps_growth_rate_pct >= 5", "pe_percentile_180d <= 0.3"], meaning: "EPS 涨但 P/E 低位，估值修复机会" }
  - { phase: double_kill, conditions: ["eps_growth_rate_pct <= -5", "pe_percentile_180d <= 0.3", "pe_trend_30d < 0"], meaning: "戴维斯双杀冬天" }
  - { phase: neutral, conditions: ["不满足上述 3"], meaning: "中性观望" }

# =====================================================================
# valuation_health_score 映射（D3 health 公式新维度）
# =====================================================================
health_score_mapping:
  davis_double_click: 90
  single_click_eps: 70
  neutral: 50
  double_kill: 20

# =====================================================================
# 数据质量验收矩阵（启动期 16 项）
# =====================================================================
quality_matrix:
  formula_correctness:
    - { id: F1, item: current_pe_formula, threshold: "ttm_eps>0 否则 null+tag negative_eps" }
    - { id: F2, item: forward_pe_formula, threshold: "缺一致预测 null+tag consensus_unavailable" }
    - { id: F3, item: peg_formula, threshold: "增长率<5% tag low_growth_peg_unreliable" }
    - { id: F4, item: historical_percentile, threshold: "样本<30 tag low_sample_percentile" }
    - { id: F5, item: industry_median, threshold: "申万二级>=10 否则升一级；<5 拒绝" }
  davis_classification:
    - { id: D1, phase: davis_double_click }
    - { id: D2, phase: single_click_eps }
    - { id: D3, phase: double_kill }
    - { id: D4, phase: neutral }
  cross_dim_contracts:
    - { id: C1, item: thesis_card_integration, requirement: "thesis 卡 valuation_dynamics 字段必填" }
    - { id: C2, item: d3_health_integration, requirement: "valuation_health_score 映射推 D3 step_06" }
    - { id: C3, item: fact_gate_integration, requirement: "P/E 历史时序数据点写库前走 fact_gate.verify" }
  anti_patterns:
    - { id: E1, item: forbid_circular_reasoning, requirement: "禁止用未验证 consensus 反推「便宜」" }
    - { id: E2, item: sample_period_tag, requirement: "pe_percentile_* 必带 sample_start/end/count" }
    - { id: E3, item: industry_as_of, requirement: "industry_median_pe 必带 as_of_date 过期 7d 重算" }
    - { id: E4, item: no_auto_trade, requirement: "禁止嵌入 buy/qmt/auto_trade 字段" }

# =====================================================================
# 实施要点 A~J
# =====================================================================
implementation_points:
  - { id: A, item: ValuationDynamics_schema, location: "apps/deep_strike/valuation/schemas.py" }
  - { id: B, item: pe_calculator, location: "apps/deep_strike/valuation/pe_calculator.py" }
  - { id: C, item: pe_percentile, location: "apps/deep_strike/valuation/pe_percentile.py" }
  - { id: D, item: industry_median, location: "apps/deep_strike/valuation/industry_median.py" }
  - { id: E, item: davis_classifier, location: "apps/deep_strike/valuation/davis_classifier.py" }
  - { id: F, item: orchestrator, location: "apps/deep_strike/valuation/orchestrator.py" }
  - { id: G, item: api_routes, location: "apps/deep_strike/api/routes/valuation.py", path: "POST /api/valuation/evaluate/{symbol}" }
  - { id: H, item: thesis_card_integration, location: "step_05 升级（已在 step_05 处理）" }
  - { id: I, item: d3_health_integration, location: "D3 step_06 升级（可选 4 维加权）" }
  - { id: J, item: unit_tests, location: "tests/deep_strike/test_valuation_*.py", count: 17 }

# =====================================================================
# Makefile 合约
# =====================================================================
makefile_targets:
  - { name: deep-step11-prep, purpose: "TimescaleDB pe_history 表存在 + akshare 可达" }
  - { name: deep-step11-backfill-pe-history, purpose: "拉 active 标的近 3 年日频 P/E" }
  - { name: deep-step11-evaluate-all, purpose: "全 active 调 orchestrator" }
  - { name: deep-step11-davis-distribution, purpose: "输出 4 档分布" }
  - { name: deep-step11-quality-check, purpose: "16 项矩阵" }
  - { name: deep-step11-test, purpose: "pytest >=17" }
  - { name: deep-step11-all, purpose: "端到端" }
  - { name: deep-step11-status, purpose: "覆盖率/davis 分布/quality tags" }
  - { name: deep-step11-clean, purpose: "dev only" }

# =====================================================================
# 准出标准
# =====================================================================
exit_criteria:
  - "§3.5 16 项全过"
  - "active 标的 100% 有 valuation_dynamics 行"
  - "人工抽检 20 只 davis 分类一致率 >=90%"
  - "make deep-step11-all exit 0"
  - "L4 实践记录 + commit + 同会话 pytest"
  - "thesis 卡 100% 含 valuation_dynamics 字段"

# =====================================================================
# 验证命令
# =====================================================================
verification_commands:
  - "cd diting-src && make deep-step11-test"
  - "cd diting-src && make deep-step11-quality-check"
  - "cd diting-src && make deep-step11-davis-distribution"

# =====================================================================
# 部署节奏
# =====================================================================
deployment_tiers:
  - { tier: tier-1, env: local, required: true, scope: "公式 + 分类逻辑 + 单测" }
  - { tier: P-track-DB, env: prod.conn TimescaleDB NodePort 30001, required: recommended }
  - { tier: stage-2, env: 接入券商一致预测 API, required: false, decision_pending: "选 wind/同花顺/其他 + 费用估算" }

# =====================================================================
# 风险
# =====================================================================
risks:
  - { trigger: akshare_consensus_eps_缺失率_gt_30pct, action: "标 consensus_unavailable 不阻塞" }
  - { trigger: 历史样本不足_30日, action: "tag low_sample_percentile，不输出 davis_phase" }
  - { trigger: 同行业基准_lt_5样本, action: "拒绝判定 single_click_eps" }
  - { trigger: 同问题_gte_2次, action: "回收/退出（§8.4f）" }

# =====================================================================
# 修订
# =====================================================================
revision:
  - { date: "2026-05-27", change: "v1.0 初版（本轮关键重构 §4.5）：从 Gemini 对话循环论证抽象戴维斯 4 档判定；纯写死纯函数 + numpy.percentile + akshare；与 step_05 thesis / D3 step_06 health / 共享规约 22 fact_gate 全集成" }
