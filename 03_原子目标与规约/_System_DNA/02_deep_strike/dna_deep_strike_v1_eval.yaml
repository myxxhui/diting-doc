# 纵深进攻 V1 评测与兜底 · 步骤级 DNA
schema_version: "1.0.0"
stage_id: deep_strike_v1_eval
pillar: deep_strike
milestone: v1

design_doc: ../../纵深进攻/05_实施推演_设计.md#三v1完整能力
l4_doc:    ../../../04_阶段规划与实践/维度二_纵深进攻/04_V1_eval_本阶段实践与验证.md
l5_anchor: l5-pillar-deep-v1-eval

work_dir: diting-src/diting/deep_strike/

services_in_scope:
  - fallback_rule_paths
  - eval_dataset_and_runner

fallback_rule_paths:
  triggers: [inference_breaker_open, model_unavailable]
  output_label_required: degraded=true
  coverage_min_pct: 95

eval_dataset_and_runner:
  initial_dataset_size: 200
  upload_target: super_evo_eval_datasets
  runner_cron: "0 2 * * 1"   # 每周一 02:00
  triggers: super_evo_eval_runner
  report_destination: deep_strike_council_grayscale_dashboard

depends_on:
  - deep_strike_v1_council
  - super_evo_v1_eval

verification_commands:
  - cmd: "cd diting-src && make test-deep-strike-eval"
    expect_exit: 0
  - cmd: "cd diting-src && make redteam-deep-strike-fallback"
    expect_keywords: ["coverage>=95%"]
  - cmd: "cd diting-src && make weekly-eval-dryrun"
    expect_keywords: ["report generated"]

exit_criteria:
  - 推理熔断时 ≥ 95% 议题仍能输出
  - 每周评测自动跑并报告至 super_evo

failure_protocol:
  same_problem_retry_max: 2
  if_exceeded: 评测集污染 → 多版本对照；不混入正式版本
