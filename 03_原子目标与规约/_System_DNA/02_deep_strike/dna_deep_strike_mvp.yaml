# 纵深进攻 MVP · 步骤级 DNA
schema_version: "1.0.0"
stage_id: deep_strike_mvp
pillar: deep_strike
milestone: mvp

design_doc: ../../纵深进攻/05_实施推演_设计.md#二mvp最小可用产品
l4_doc:    ../../../04_阶段规划与实践/维度二_纵深进攻/01_MVP_本阶段实践与验证.md
l5_anchor: l5-pillar-deep-mvp

work_dir: diting-src/diting/deep_strike/

services_in_scope:
  - content_comprehension_basic
  - research_council_single_agent
  - candidate_registry_basic
  - agenda_orchestrator_periodic

proto_v1:
  - ResearchCard
  - Candidate
  - CouncilSession
  - AgendaTopic
  - ToolCall

db_tables:
  - research_cards
  - candidates
  - council_sessions
  - agenda_topics
  - tool_calls
  - comprehension_entities
  - comprehension_events
  - subject_segment_map
  - subject_timeline

agenda:
  cron_jobs:
    - id: daily_market_scan
      cron: "0 16 * * 1-5"        # 工作日 16 点
    - id: nightly_news_sweep
      cron: "30 22 * * *"

council:
  agent_strategy: single_agent
  default_tools: [retrieval, inference_gateway]
  fallback_required: true
  evidence_required: true
  confidence_required: true

candidate_registry:
  status_flow: [draft, pending_gate, active, archived]
  on_active_notify: state_watch    # 候选 active → 状态机监控可拉起

frontend:
  app: console
  page: research_dashboard_mvp     # 见 frontend/dna_frontend_mvp.yaml（候选广场 / 卡片详情）

depends_on:
  - cryo_guard_mvp
  - shared_platform_baseline

verification_commands:
  - cmd: "cd diting-src && make test-deep-strike-mvp"
    expect_exit: 0
  - cmd: "cd diting-src && make smoke-deep-strike-mvp"
    expect_keywords:
      - "周期议程触发"
      - "候选生成"
      - "极寒防御门禁通过"

exit_criteria:
  - 周期议程稳定（每日 ≥ 1 议题）
  - 卡片 100% 含证据链且能被门禁放行
  - Session transcript 可被回放

failure_protocol:
  same_problem_retry_max: 2
  if_exceeded: 回退到最近一次稳定提交并登记
