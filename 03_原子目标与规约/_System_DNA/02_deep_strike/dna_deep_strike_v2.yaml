# 纵深进攻 V2 Tool Runtime · 步骤级 DNA
schema_version: "1.0.0"
stage_id: deep_strike_v2_runtime
pillar: deep_strike
milestone: v2

design_doc: ../../纵深进攻/05_实施推演_设计.md#四v2生产稳态
l4_doc:    ../../../04_阶段规划与实践/维度二_纵深进攻/05_V2_runtime_本阶段实践与验证.md
l5_anchor: l5-pillar-deep-v2-runtime

work_dir: diting-src/diting/deep_strike/

services_in_scope:
  - tool_runtime_browser_and_cu
  - adaptive_agenda
  - cross_topic_learning
  - multimodal_evidence

tool_runtime_browser_and_cu:
  sandbox: gvisor_or_firecracker
  resource_quota:
    cpu_milli: 2000
    memory_mb: 4096
    timeout_seconds: 300
  recording: true
  escape_test_required: true

adaptive_agenda:
  algorithm: contextual_bandit
  reward_signal: eval_score + user_engagement

cross_topic_learning:
  memory_source: super_evo_knowledge_base
  recall_min_relevance: 0.6

multimodal_evidence:
  modalities: [text, table, image, pdf]
  embedder_routing: by_modality

depends_on:
  - deep_strike_v1_council
  - deep_strike_v1_feature

verification_commands:
  - cmd: "cd diting-src && make sandbox-escape-tests"
    expect_keywords: ["no_escape"]
  - cmd: "cd diting-src && make adaptive-agenda-bench"
    expect_keywords: ["measurable_uplift"]
  - cmd: "cd diting-src && make multimodal-rag-bench"
    expect_exit: 0

exit_criteria:
  - Tool Runtime 沙箱安全（无逃逸）
  - 自适应议程指标可衡量
  - 多模态证据议会可消费

failure_protocol:
  same_problem_retry_max: 2
  if_exceeded: Sandbox 异常 → 立即下线该 tool + critical RiskEvent
