  - "抽检 20 只一致率 >=80%"
  - "4 档分布不畸形（任一档 ∈ [5%, 70%]）"
  - "make watch-step09-all exit 0"
  - "D3 step_07 health_change schema 升级完成"
  - "L4 实践记录 + commit + 同会话 pytest"

