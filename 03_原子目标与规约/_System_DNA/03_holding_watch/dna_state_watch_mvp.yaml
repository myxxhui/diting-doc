# 状态机监控 MVP · 步骤级 DNA
schema_version: "1.0.0"
stage_id: state_watch_mvp
pillar: state_watch
milestone: mvp

design_doc: ../../状态机监控/05_实施推演_设计.md#二mvp最小可用产品
l4_doc:    ../../../04_阶段规划与实践/维度三_持仓监控/01_MVP_本阶段实践与验证.md
l5_anchor: l5-pillar-watch-mvp

work_dir: diting-src/diting/state_watch/

services_in_scope:
  - template_instance_registry
  - probe_scheduler_quote_only
  - transition_evaluator_dsl
  - advisory_generator_no_gate
  - notification_dispatcher_push_email
  - watchlist_grouping

proto_v1:
  - StateMachineTemplate
  - StateMachineInstance
  - ProbeResult
  - TransitionEvent
  - Advisory
  - WatchList

db_tables:
  - templates
  - instances
  - instance_history
  - probe_results
  - transition_events
  - advisories
  - watchlists
  - watchlist_items
  - notification_logs

templates_seed:
  - id: tmpl_breakout_v1
    description: 突破型标的
  - id: tmpl_distress_reversal_v1
    description: 困境反转型

probe:
  quote:
    interval_sec: 300              # 5 min
    adaptive: false                # MVP 不自适应

advisory:
  require_evidence: true
  require_fallback: true
  expires_in_sec_default: 86400
  on_create_call_decision_gate: false  # MVP 不调；V1 开

notification:
  budget_enforced: false           # MVP 关闭；V1 开
  channels: [push, email]

watchlist:
  on_add_auto_create_instance: true

frontend:
  app: console
  page: watchlist_center_mvp       # 见 frontend/dna_frontend_mvp.yaml

depends_on:
  - shared_platform_baseline

verification_commands:
  - cmd: "cd diting-src && make test-state-watch-mvp"
    expect_exit: 0
  - cmd: "cd diting-src && make smoke-state-watch-mvp"
    expect_keywords:
      - "实例创建"
      - "探针抓取"
      - "状态迁移"
      - "Advisory 生成"
      - "通知投递"

exit_criteria:
  - 行情触发的迁移 < 10s 在前端可见
  - 通知能投递（push/email）
  - 单元测试覆盖率 ≥ 70%

failure_protocol:
  same_problem_retry_max: 2
  if_exceeded: 回退到最近一次稳定提交并登记
