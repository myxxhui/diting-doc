# 状态机监控 V1 与极寒防御联动 · 步骤级 DNA
schema_version: "1.0.0"
stage_id: state_watch_v1_gate
pillar: state_watch
milestone: v1

design_doc: ../../状态机监控/05_实施推演_设计.md#三v1完整能力
l4_doc:    ../../../04_阶段规划与实践/维度三_持仓监控/03_V1_gate_本阶段实践与验证.md
l5_anchor: l5-pillar-watch-v1-gate

work_dir: diting-src/diting/state_watch/advisory/

services_in_scope:
  - advisory_with_evidence_and_fallback
  - integration_with_cryo_guard_decision_gate

advisory_with_evidence_and_fallback:
  required_fields: [evidence_refs, fallback_actions]
  schema_version: "v2"

integration_with_cryo_guard_decision_gate:
  must_pass_layers: [schema, evidence, compliance]
  on_reject_action: archive_instance_and_record

depends_on:
  - state_watch_mvp
  - cryo_guard_v1

verification_commands:
  - cmd: "cd diting-src && make test-state-watch-gate"
    expect_exit: 0
  - cmd: "cd diting-src && make e2e-advisory-gate"
    expect_keywords: ["missing_evidence_rejected", "missing_fallback_rejected"]
  - cmd: "cd diting-src && make audit-chain-watch-advisory"
    expect_keywords: ["chain_complete"]

exit_criteria:
  - 缺 evidence 或 fallback 的 Advisory 被门禁 reject
  - 端到端审计链完整

failure_protocol:
  same_problem_retry_max: 2
  if_exceeded: 门禁连接失败 → Advisory 暂存 + 重试；超时则触发 RiskEvent
