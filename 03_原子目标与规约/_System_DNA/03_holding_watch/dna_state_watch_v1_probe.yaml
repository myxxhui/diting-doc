# 状态机监控 V1 多探针 · 步骤级 DNA
schema_version: "1.0.0"
stage_id: state_watch_v1_probe
pillar: state_watch
milestone: v1

design_doc: ../../状态机监控/05_实施推演_设计.md#三v1完整能力
l4_doc:    ../../../04_阶段规划与实践/维度三_持仓监控/02_V1_probe_本阶段实践与验证.md
l5_anchor: l5-pillar-watch-v1-probe

work_dir: diting-src/diting/state_watch/probe/

services_in_scope:
  - probe_news_realtime
  - probe_derivative
  - adaptive_frequency
  - guards_hard_and_soft

probe_news_realtime:
  source: kafka_topic_news
  trigger_latency_p99_seconds: 5

probe_derivative:
  sources: [super_evo_eval_results, data_layer_events]

adaptive_frequency:
  base_interval_seconds: 300
  active_interval_seconds: 60
  idle_interval_seconds: 1800
  density_window_minutes: 30

guards_hard_and_soft:
  hard_threshold_actions: [archive_instance, emit_risk_event]
  soft_trend_actions: [advisory_with_warning]

depends_on:
  - state_watch_mvp

verification_commands:
  - cmd: "cd diting-src && make test-state-watch-probe"
    expect_exit: 0
  - cmd: "cd diting-src && make adaptive-frequency-bench"
    expect_keywords: ["interval shortened on active", "interval lengthened on idle"]
  - cmd: "cd diting-src && make guards-breach-bench"
    expect_keywords: ["hard triggered", "soft triggered"]

exit_criteria:
  - 实时新闻可触发迁移
  - 高活跃实例 interval 自动缩短
  - 越界保护带 hard / soft 全部生效

failure_protocol:
  same_problem_retry_max: 2
  if_exceeded: 探针失败 N 次 → 标记 unhealthy + 通知极寒防御
